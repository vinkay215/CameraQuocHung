<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Quốc Hùng - Tải Ứng Dụng</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    margin:0;
}

.banner{
    background: linear-gradient(135deg,#2563EB,#1E40AF);
    color:white;
    text-align:center;
    padding:40px 20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px 20px;
}

.guide{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

.app-card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px;
    margin-bottom:20px;
}

.app-left{
    display:flex;
    align-items:center;
}

.app-icon{
    width:60px;
    height:60px;
    border-radius:12px;
    margin-right:15px;
}

.app-name{
    font-size:18px;
    font-weight:bold;
}

.download-btn{
    background:#2563EB;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.download-btn:hover{
    background:#1D4ED8;
}

</style>
</head>

<body>

<div class="banner">
Camera Quốc Hùng
</div>

<div class="container">

<div class="guide">
<h2>Hướng Dẫn Sử Dụng</h2>

<p><b>Bước 1:</b> Tải ứng dụng <b>Youtube Premium</b>.</p>
<p><b>Bước 2:</b> Tải ứng dụng <b>MicroG</b>.</p>

<p style="color:red;"><b>Lưu ý:</b> Phải tải đủ cả 2 ứng dụng thì hệ thống mới hoạt động.</p>
</div>

<!-- App 1 -->
<div class="app-card">

<div class="app-left">
<img class="app-icon" src="https://github.com/vinkay215/CameraQuocHung/blob/main/app1.png?raw=true">
<div class="app-name">Youtube Premium</div>
</div>

<button class="download-btn"
onclick="window.open('https://drive.google.com/file/d/17QperZ3yeK2lHYh7HX9v54V0-aXCQZbF/view?usp=sharing')">
Tải xuống
</button>

</div>

<!-- App 2 -->
<div class="app-card">

<div class="app-left">
<img class="app-icon" src="https://github.com/vinkay215/CameraQuocHung/blob/main/microg.png?raw=true">
<div class="app-name">MicroG</div>
</div>

<button class="download-btn"
onclick="window.open('https://github.com/vinkay215/CameraQuocHung/raw/refs/heads/main/MicroG_v6.1.1.apk')">
Tải xuống
</button>

</div>

</div>

</body>
</html>
